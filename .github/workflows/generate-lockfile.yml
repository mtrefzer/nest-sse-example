name: Generate Lock File
on:
  workflow_dispatch:

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Show lock file
        run: cat pnpm-lock.yaml
